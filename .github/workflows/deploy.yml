name: Deploy Portfolio Infrastructure And Website

on:

  push:
    branches:
      - main

jobs:

  # =====================================================
  # JOB 1 — STAGING
  # =====================================================

  deploy-staging:

    name: Deploy To Staging

    runs-on: ubuntu-latest

    steps:

      # ==========================================
      # CHECKOUT REPOSITORY
      # ==========================================

      - name: Checkout Repository
        uses: actions/checkout@v4

      # ==========================================
      # CONFIGURE AWS CREDENTIALS
      # ==========================================

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4

        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # ==========================================
      # DEPLOY COMPLETE INFRASTRUCTURE
      # ==========================================

      - name: Deploy Infrastructure Stack
        run: |

          aws cloudformation deploy \
          --template-file infrastructure/cloudformation/infrastructure.yaml \
          --stack-name aws-portfolio-infrastructure

      # ==========================================
      # WAIT FOR INFRASTRUCTURE STACK
      # ==========================================

      - name: Wait For Infrastructure Stack
        run: |

          aws cloudformation wait stack-create-complete \
          --stack-name aws-portfolio-infrastructure || \
          aws cloudformation wait stack-update-complete \
          --stack-name aws-portfolio-infrastructure

      # ==========================================
      # DEPLOY CONTACT STACK
      # ==========================================

      - name: Deploy Contact Stack
        run: |

          aws cloudformation deploy \
          --template-file infrastructure/cloudformation/contact-stack.yaml \
          --stack-name aws-portfolio-contact \
          --parameter-overrides \
            NotificationEmail=${{ secrets.NOTIFICATION_EMAIL }} \
          --capabilities CAPABILITY_NAMED_IAM

      # ==========================================
      # GET AWS ACCOUNT ID
      # ==========================================

      - name: Get AWS Account ID
        run: |

          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)

          echo "ACCOUNT_ID=$ACCOUNT_ID" >> $GITHUB_ENV

      # ==========================================
      # DEPLOY WEBSITE TO STAGING S3
      # ==========================================

      - name: Deploy Website To STAGING S3
        run: |

          aws s3 sync website/ s3://aws-portfolio-staging-${ACCOUNT_ID} --delete

      # ==========================================
      # GET STAGING DISTRIBUTION ID
      # ==========================================

      - name: Get Staging Distribution ID
        run: |

          STAGING_ID=$(aws cloudformation describe-stacks \
            --stack-name aws-portfolio-infrastructure \
            --query "Stacks[0].Outputs[?OutputKey=='StagingDistributionId'].OutputValue" \
            --output text)

          echo "STAGING_DISTRIBUTION_ID=$STAGING_ID" >> $GITHUB_ENV

      # ==========================================
      # WAIT FOR STAGING DISTRIBUTION
      # ==========================================

      - name: Wait For STAGING Distribution Deployment
        run: |

          aws cloudfront wait distribution-deployed \
          --id ${STAGING_DISTRIBUTION_ID}

      # ==========================================
      # INVALIDATE STAGING CLOUDFRONT CACHE
      # ==========================================

      - name: Invalidate STAGING CloudFront Cache
        run: |

          aws cloudfront create-invalidation \
          --distribution-id ${STAGING_DISTRIBUTION_ID} \
          --paths "/*"

  # =====================================================
  # JOB 2 — PRODUCTION
  # =====================================================

  deploy-production:

    name: Deploy To Production

    needs: deploy-staging

    runs-on: ubuntu-latest

    environment:
      name: production

    steps:

      # ==========================================
      # CHECKOUT REPOSITORY
      # ==========================================

      - name: Checkout Repository
        uses: actions/checkout@v4

      # ==========================================
      # CONFIGURE AWS CREDENTIALS
      # ==========================================

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4

        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # ==========================================
      # GET AWS ACCOUNT ID
      # ==========================================

      - name: Get AWS Account ID
        run: |

          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)

          echo "ACCOUNT_ID=$ACCOUNT_ID" >> $GITHUB_ENV

      # ==========================================
      # DEPLOY WEBSITE TO PROD S3
      # ==========================================

      - name: Deploy Website To PROD S3
        run: |

          aws s3 sync website/ s3://aws-portfolio-prod-${ACCOUNT_ID} --delete

      # ==========================================
      # GET PRODUCTION DISTRIBUTION ID
      # ==========================================

      - name: Get Production Distribution ID
        run: |

          PROD_ID=$(aws cloudformation describe-stacks \
            --stack-name aws-portfolio-infrastructure \
            --query "Stacks[0].Outputs[?OutputKey=='ProductionDistributionId'].OutputValue" \
            --output text)

          echo "PRODUCTION_DISTRIBUTION_ID=$PROD_ID" >> $GITHUB_ENV

      # ==========================================
      # WAIT FOR PROD DISTRIBUTION
      # ==========================================

      - name: Wait For PROD Distribution Deployment
        run: |

          aws cloudfront wait distribution-deployed \
          --id ${PRODUCTION_DISTRIBUTION_ID}

      # ==========================================
      # INVALIDATE PROD CLOUDFRONT CACHE
      # ==========================================

      - name: Invalidate PROD CloudFront Cache
        run: |

          aws cloudfront create-invalidation \
          --distribution-id ${PRODUCTION_DISTRIBUTION_ID} \
          --paths "/*"