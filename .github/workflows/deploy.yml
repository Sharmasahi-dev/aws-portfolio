name: Deploy Portfolio Website

on:

  push:
    branches:
      - main

jobs:

  # =========================
  # STAGING DEPLOYMENT
  # =========================

  deploy-staging:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4

        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Get AWS Account ID
        run: |
          echo "ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)" >> $GITHUB_ENV

      - name: Deploy Website To STAGING
        run: |

          aws s3 sync website/ s3://aws-portfolio-staging-${ACCOUNT_ID} --delete

  # =========================
  # PRODUCTION DEPLOYMENT
  # =========================

  deploy-production:

    needs: deploy-staging

    runs-on: ubuntu-latest

    environment:
      name: production

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4

        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Get AWS Account ID
        run: |
          echo "ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)" >> $GITHUB_ENV

      - name: Deploy Website To PRODUCTION
        run: |

          aws s3 sync website/ s3://aws-portfolio-prod-${ACCOUNT_ID} --delete