AWSTemplateFormatVersion: '2010-09-09'

Description: Portfolio S3 Buckets For Private CloudFront Access

Parameters:

  ProjectName:
    Type: String
    Default: aws-portfolio

Resources:

  # =========================================================
  # STAGING BUCKET
  # =========================================================

  StagingBucket:
    Type: AWS::S3::Bucket

    Properties:

      BucketName: !Sub "${ProjectName}-staging-${AWS::AccountId}"

      VersioningConfiguration:
        Status: Enabled

      BucketEncryption:

        ServerSideEncryptionConfiguration:

          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

      PublicAccessBlockConfiguration:

        BlockPublicAcls: true

        IgnorePublicAcls: true

        BlockPublicPolicy: true

        RestrictPublicBuckets: true

  # =========================================================
  # STAGING BUCKET POLICY
  # =========================================================

  StagingBucketPolicy:
    Type: AWS::S3::BucketPolicy

    Properties:

      Bucket: !Ref StagingBucket

      PolicyDocument:

        Version: '2012-10-17'

        Statement:

          - Sid: AllowCloudFrontAccess

            Effect: Allow

            Principal:
              Service: cloudfront.amazonaws.com

            Action:
              - s3:GetObject

            Resource:
              - !Sub "${StagingBucket.Arn}/*"

            Condition:

              StringEquals:

                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${StagingDistributionId}"

  # =========================================================
  # PRODUCTION BUCKET
  # =========================================================

  ProductionBucket:
    Type: AWS::S3::Bucket

    Properties:

      BucketName: !Sub "${ProjectName}-prod-${AWS::AccountId}"

      VersioningConfiguration:
        Status: Enabled

      BucketEncryption:

        ServerSideEncryptionConfiguration:

          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

      PublicAccessBlockConfiguration:

        BlockPublicAcls: true

        IgnorePublicAcls: true

        BlockPublicPolicy: true

        RestrictPublicBuckets: true

  # =========================================================
  # PRODUCTION BUCKET POLICY
  # =========================================================

  ProductionBucketPolicy:
    Type: AWS::S3::BucketPolicy

    Properties:

      Bucket: !Ref ProductionBucket

      PolicyDocument:

        Version: '2012-10-17'

        Statement:

          - Sid: AllowCloudFrontAccess

            Effect: Allow

            Principal:
              Service: cloudfront.amazonaws.com

            Action:
              - s3:GetObject

            Resource:
              - !Sub "${ProductionBucket.Arn}/*"

            Condition:

              StringEquals:

                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${ProductionDistributionId}"

Outputs:

  StagingBucketName:
    Description: Staging S3 Bucket Name
    Value: !Ref StagingBucket

  ProductionBucketName:
    Description: Production S3 Bucket Name
    Value: !Ref ProductionBucket