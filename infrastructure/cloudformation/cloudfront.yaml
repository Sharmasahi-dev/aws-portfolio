AWSTemplateFormatVersion: '2010-09-09'

Description: Multi Environment CloudFront Distribution For Portfolio Website

Parameters:

  ProjectName:
    Type: String
    Default: aws-portfolio

Resources:

  # =========================================================
  # ORIGIN ACCESS CONTROL (OAC)
  # =========================================================

  PortfolioOAC:
    Type: AWS::CloudFront::OriginAccessControl

    Properties:

      OriginAccessControlConfig:

        Name: PortfolioOAC

        Description: OAC For Private S3 Access

        OriginAccessControlOriginType: s3

        SigningBehavior: always

        SigningProtocol: sigv4

  # =========================================================
  # STAGING CLOUDFRONT DISTRIBUTION
  # =========================================================

  StagingDistribution:
    Type: AWS::CloudFront::Distribution

    Properties:

      DistributionConfig:

        Enabled: true

        Comment: Staging CloudFront Distribution

        DefaultRootObject: index.html

        Origins:

          - Id: StagingS3Origin

            DomainName: !Sub "${ProjectName}-staging-${AWS::AccountId}.s3.${AWS::Region}.amazonaws.com"

            S3OriginConfig: {}

            OriginAccessControlId: !GetAtt PortfolioOAC.Id

        DefaultCacheBehavior:

          TargetOriginId: StagingS3Origin

          ViewerProtocolPolicy: redirect-to-https

          AllowedMethods:
            - GET
            - HEAD

          CachedMethods:
            - GET
            - HEAD

          Compress: true

          ForwardedValues:
            QueryString: false

        PriceClass: PriceClass_100

  # =========================================================
  # PRODUCTION CLOUDFRONT DISTRIBUTION
  # =========================================================

  ProductionDistribution:
    Type: AWS::CloudFront::Distribution

    Properties:

      DistributionConfig:

        Enabled: true

        Comment: Production CloudFront Distribution

        DefaultRootObject: index.html

        Origins:

          - Id: ProductionS3Origin

            DomainName: !Sub "${ProjectName}-prod-${AWS::AccountId}.s3.${AWS::Region}.amazonaws.com"

            S3OriginConfig: {}

            OriginAccessControlId: !GetAtt PortfolioOAC.Id

        DefaultCacheBehavior:

          TargetOriginId: ProductionS3Origin

          ViewerProtocolPolicy: redirect-to-https

          AllowedMethods:
            - GET
            - HEAD

          CachedMethods:
            - GET
            - HEAD

          Compress: true

          ForwardedValues:
            QueryString: false

        PriceClass: PriceClass_100

Outputs:

  StagingDistributionId:
    Description: Staging CloudFront Distribution ID
    Value: !Ref StagingDistribution

  StagingDistributionDomain:
    Description: Staging CloudFront Domain
    Value: !GetAtt StagingDistribution.DomainName

  ProductionDistributionId:
    Description: Production CloudFront Distribution ID
    Value: !Ref ProductionDistribution

  ProductionDistributionDomain:
    Description: Production CloudFront Domain
    Value: !GetAtt ProductionDistribution.DomainName

  OriginAccessControlId:
    Description: CloudFront Origin Access Control ID
    Value: !GetAtt PortfolioOAC.Id