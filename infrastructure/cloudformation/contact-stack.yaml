AWSTemplateFormatVersion: '2010-09-09'

Description: >
  Contact Form Infrastructure
  API Gateway + Lambda + DynamoDB + SNS

# =========================================================
# PARAMETERS
# =========================================================

Parameters:

  NotificationEmail:

    Type: String

    Description: Email address for contact notifications


# =========================================================
# RESOURCES
# =========================================================

Resources:

  # =======================================================
  # DYNAMODB TABLE
  # =======================================================

  ContactMessagesTable:

    Type: AWS::DynamoDB::Table

    Properties:

      TableName: portfolio-contact-messages

      BillingMode: PAY_PER_REQUEST

      AttributeDefinitions:

        - AttributeName: messageId
          AttributeType: S

      KeySchema:

        - AttributeName: messageId
          KeyType: HASH


  # =======================================================
  # SNS TOPIC
  # =======================================================

  ContactSNSTopic:

    Type: AWS::SNS::Topic

    Properties:

      TopicName: portfolio-contact-topic


  # =======================================================
  # SNS EMAIL SUBSCRIPTION
  # =======================================================

  ContactEmailSubscription:

    Type: AWS::SNS::Subscription

    Properties:

      TopicArn: !Ref ContactSNSTopic

      Protocol: email

      Endpoint: !Ref NotificationEmail


  # =======================================================
  # IAM ROLE FOR LAMBDA
  # =======================================================

  ContactLambdaRole:

    Type: AWS::IAM::Role

    Properties:

      RoleName: portfolio-contact-lambda-role

      AssumeRolePolicyDocument:

        Version: '2012-10-17'

        Statement:

          - Effect: Allow

            Principal:

              Service:
                - lambda.amazonaws.com

            Action:
              - sts:AssumeRole

      ManagedPolicyArns:

        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

      Policies:

        - PolicyName: ContactLambdaPolicy

          PolicyDocument:

            Version: '2012-10-17'

            Statement:

              # DynamoDB Access

              - Effect: Allow

                Action:

                  - dynamodb:PutItem

                Resource: !GetAtt ContactMessagesTable.Arn

              # SNS Publish Access

              - Effect: Allow

                Action:

                  - sns:Publish

                Resource: !Ref ContactSNSTopic


  # =======================================================
  # LAMBDA FUNCTION
  # =======================================================

  ContactLambdaFunction:

    Type: AWS::Lambda::Function

    Properties:

      FunctionName: portfolio-contact-handler

      Runtime: nodejs22.x

      Handler: index.handler

      Role: !GetAtt ContactLambdaRole.Arn

      Timeout: 10

      PackageType: Zip

      Environment:

        Variables:

          TABLE_NAME: !Ref ContactMessagesTable

          SNS_TOPIC_ARN: !Ref ContactSNSTopic

      Code:

        ZipFile: |

          const {
            DynamoDBClient
          } = require("@aws-sdk/client-dynamodb");

          const {
            DynamoDBDocumentClient,
            PutCommand
          } = require("@aws-sdk/lib-dynamodb");

          const {
            SNSClient,
            PublishCommand
          } = require("@aws-sdk/client-sns");

          const dynamoClient =
            new DynamoDBClient({});

          const dynamodb =
            DynamoDBDocumentClient.from(dynamoClient);

          const sns =
            new SNSClient({});

          exports.handler = async (event) => {

              try {

                  console.log(
                    "Received Event:",
                    JSON.stringify(event)
                  );

                  const body =
                    JSON.parse(event.body);

                  // =========================
                  // VALIDATION
                  // =========================

                  if (
                    !body.name ||
                    !body.email ||
                    !body.message
                  ) {

                      return {

                          statusCode: 400,

                          headers: {

                              "Access-Control-Allow-Origin": "*",

                              "Access-Control-Allow-Headers": "*",

                              "Access-Control-Allow-Methods": "*"
                          },

                          body: JSON.stringify({

                              error:
                                "All fields are required"
                          })
                      };
                  }

                  // =========================
                  // CREATE ITEM
                  // =========================

                  const item = {

                      messageId:
                        Date.now().toString(),

                      name: body.name,

                      email: body.email,

                      message: body.message,

                      createdAt:
                        new Date().toISOString()
                  };

                  // =========================
                  // SAVE TO DYNAMODB
                  // =========================

                  await dynamodb.send(

                      new PutCommand({

                          TableName:
                            process.env.TABLE_NAME,

                          Item: item
                      })
                  );

                  console.log(
                    "Saved To DynamoDB"
                  );

                  // =========================
                  // SEND SNS EMAIL
                  // =========================

                  await sns.send(

                      new PublishCommand({

                          TopicArn:
                            process.env.SNS_TOPIC_ARN,

                          Subject:
                            "New Portfolio Contact Message",

                          Message:
                            "Name: " + body.name +
                            "\n\nEmail: " + body.email +
                            "\n\nMessage:\n" + body.message
                      })
                  );

                  console.log(
                    "SNS Email Sent"
                  );

                  // =========================
                  // SUCCESS RESPONSE
                  // =========================

                  return {

                      statusCode: 200,

                      headers: {

                          "Access-Control-Allow-Origin": "*",

                          "Access-Control-Allow-Headers": "*",

                          "Access-Control-Allow-Methods": "*"
                      },

                      body: JSON.stringify({

                          message:
                            "Message sent successfully"
                      })
                  };

              } catch (error) {

                  console.error(
                    "Lambda Error:",
                    error
                  );

                  return {

                      statusCode: 500,

                      headers: {

                          "Access-Control-Allow-Origin": "*",

                          "Access-Control-Allow-Headers": "*",

                          "Access-Control-Allow-Methods": "*"
                      },

                      body: JSON.stringify({

                          error:
                            "Failed to process request"
                      })
                  };
              }
          };


  # =======================================================
  # API GATEWAY
  # =======================================================

  ContactApi:

    Type: AWS::ApiGatewayV2::Api

    Properties:

      Name: portfolio-contact-api

      ProtocolType: HTTP

      CorsConfiguration:

        AllowOrigins:

          - "*"

        AllowMethods:

          - POST

        AllowHeaders:

          - "*"


  # =======================================================
  # API INTEGRATION
  # =======================================================

  ContactApiIntegration:

    Type: AWS::ApiGatewayV2::Integration

    Properties:

      ApiId: !Ref ContactApi

      IntegrationType: AWS_PROXY

      IntegrationUri: !GetAtt ContactLambdaFunction.Arn

      PayloadFormatVersion: '2.0'


  # =======================================================
  # API ROUTE
  # =======================================================

  ContactApiRoute:

    Type: AWS::ApiGatewayV2::Route

    Properties:

      ApiId: !Ref ContactApi

      RouteKey: 'POST /contact'

      Target: !Sub integrations/${ContactApiIntegration}


  # =======================================================
  # API STAGE
  # =======================================================

  ContactApiStage:

    Type: AWS::ApiGatewayV2::Stage

    Properties:

      ApiId: !Ref ContactApi

      StageName: prod

      AutoDeploy: true


  # =======================================================
  # LAMBDA PERMISSION
  # =======================================================

  ContactLambdaPermission:

    Type: AWS::Lambda::Permission

    Properties:

      Action: lambda:InvokeFunction

      FunctionName: !Ref ContactLambdaFunction

      Principal: apigateway.amazonaws.com


# =========================================================
# OUTPUTS
# =========================================================

Outputs:

  ContactApiEndpoint:

    Description: API Gateway Endpoint

    Value: !Sub 'https://${ContactApi}.execute-api.${AWS::Region}.amazonaws.com/prod/contact'


  DynamoDBTableName:

    Description: DynamoDB Table Name

    Value: !Ref ContactMessagesTable


  SNSTopicArn:

    Description: SNS Topic ARN

    Value: !Ref ContactSNSTopic