AWSTemplateFormatVersion: '2010-09-09'

Description: >
  Contact Form Infrastructure
  API Gateway + Lambda + DynamoDB + SNS

Parameters:

  NotificationEmail:

    Type: String

    Description: Email address for contact notifications


Resources:

  # =======================================================
  # DYNAMODB TABLE
  # =======================================================

  ContactMessagesTable:

    Type: AWS::DynamoDB::Table

    Properties:

      TableName: portfolio-contact-messages

      BillingMode: PAY_PER_REQUEST

      AttributeDefinitions:

        - AttributeName: messageId
          AttributeType: S

      KeySchema:

        - AttributeName: messageId
          KeyType: HASH


  # =======================================================
  # SNS TOPIC
  # =======================================================

  ContactSNSTopic:

    Type: AWS::SNS::Topic

    Properties:

      TopicName: portfolio-contact-topic


  # =======================================================
  # SNS EMAIL SUBSCRIPTION
  # =======================================================

  ContactEmailSubscription:

    Type: AWS::SNS::Subscription

    Properties:

      TopicArn: !Ref ContactSNSTopic

      Protocol: email

      Endpoint: !Ref NotificationEmail


  # =======================================================
  # IAM ROLE FOR LAMBDA
  # =======================================================

  ContactLambdaRole:

    Type: AWS::IAM::Role

    Properties:

      RoleName: portfolio-contact-lambda-role-v2

      AssumeRolePolicyDocument:

        Version: '2012-10-17'

        Statement:

          - Effect: Allow

            Principal:

              Service:
                - lambda.amazonaws.com

            Action:
              - sts:AssumeRole

      ManagedPolicyArns:

        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

      Policies:

        - PolicyName: ContactLambdaPolicy

          PolicyDocument:

            Version: '2012-10-17'

            Statement:

              # DynamoDB Permission

              - Effect: Allow

                Action:

                  - dynamodb:PutItem

                Resource: !GetAtt ContactMessagesTable.Arn

              # SNS Permission

              - Effect: Allow

                Action:

                  - sns:Publish

                Resource: !Ref ContactSNSTopic


  # =======================================================
  # NODEJS22 PACKAGED LAMBDA
  # =======================================================

  ContactLambdaFunction:

    Type: AWS::Lambda::Function

    Properties:

      # ==========================================
      # CHANGED — NEW FUNCTION NAME
      # Fixes CloudFormation replacement error
      # ==========================================

      FunctionName: portfolio-contact-handler-v2

      # ==========================================
      # CHANGED — NODEJS22
      # ==========================================

      Runtime: nodejs22.x

      Handler: index.handler

      Role: !GetAtt ContactLambdaRole.Arn

      Timeout: 10

      PackageType: Zip

      Environment:

        Variables:

          TABLE_NAME: !Ref ContactMessagesTable

          SNS_TOPIC_ARN: !Ref ContactSNSTopic


      # ==========================================
      # CHANGED — USING S3 ZIP DEPLOYMENT
      # ==========================================

      Code:

        S3Bucket: aws-portfolio-lambda-deployments

        S3Key: function.zip


  # =======================================================
  # API GATEWAY
  # =======================================================

  ContactApi:

    Type: AWS::ApiGatewayV2::Api

    Properties:

      Name: portfolio-contact-api

      ProtocolType: HTTP

      CorsConfiguration:

        AllowOrigins:

          - "*"

        AllowMethods:

          - POST

        AllowHeaders:

          - "*"


  # =======================================================
  # API INTEGRATION
  # =======================================================

  ContactApiIntegration:

    Type: AWS::ApiGatewayV2::Integration

    Properties:

      ApiId: !Ref ContactApi

      IntegrationType: AWS_PROXY

      IntegrationUri: !GetAtt ContactLambdaFunction.Arn

      PayloadFormatVersion: '2.0'


  # =======================================================
  # API ROUTE
  # =======================================================

  ContactApiRoute:

    Type: AWS::ApiGatewayV2::Route

    Properties:

      ApiId: !Ref ContactApi

      RouteKey: 'POST /contact'

      Target: !Sub integrations/${ContactApiIntegration}


  # =======================================================
  # API STAGE
  # =======================================================

  ContactApiStage:

    Type: AWS::ApiGatewayV2::Stage

    Properties:

      ApiId: !Ref ContactApi

      StageName: prod

      AutoDeploy: true


  # =======================================================
  # LAMBDA PERMISSION
  # =======================================================

  ContactLambdaPermission:

    Type: AWS::Lambda::Permission

    Properties:

      Action: lambda:InvokeFunction

      FunctionName: !Ref ContactLambdaFunction

      Principal: apigateway.amazonaws.com


Outputs:

  ContactApiEndpoint:

    Description: API Gateway Endpoint

    Value: !Sub 'https://${ContactApi}.execute-api.${AWS::Region}.amazonaws.com/prod/contact'


  DynamoDBTableName:

    Description: DynamoDB Table Name

    Value: !Ref ContactMessagesTable


  SNSTopicArn:

    Description: SNS Topic ARN

    Value: !Ref ContactSNSTopic